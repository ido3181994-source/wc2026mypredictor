<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#090d18">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WC Analyst">
<meta name="description" content="Daily World Cup 2026 predictions by an elite football data analyst">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>WC 2026 Analyst</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#090d18;--card:#111827;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --green:#10b981;--gdim:rgba(16,185,129,.12);
  --amber:#f59e0b;--adim:rgba(245,158,11,.12);
  --red:#ef4444;--rdim:rgba(239,68,68,.12);
  --gold:#fbbf24;--t1:#f9fafb;--t2:#9ca3af;--t3:#4b5563;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
html{background:var(--bg)}
body{background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100dvh;-webkit-font-smoothing:antialiased}

/* ── HEADER ── */
.hdr{background:linear-gradient(180deg,#0c1526,#090d18);border-bottom:1px solid var(--border);padding:calc(14px + var(--safe-top)) 20px 14px;position:sticky;top:0;z-index:100}
.hdr-in{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:10px}
.logo h1{font-size:17px;font-weight:800;letter-spacing:-.3px;color:#fff}
.logo h1 em{color:var(--green);font-style:normal}
.logo small{display:block;font-size:9px;text-transform:uppercase;letter-spacing:2.5px;color:var(--t3);margin-top:2px}
.hdr-right{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--t2)}
.pill{background:var(--gdim);color:var(--green);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:3px 9px;border-radius:20px;border:1px solid rgba(16,185,129,.25)}

/* ── LAYOUT ── */
.wrap{max-width:1100px;margin:0 auto;padding:24px 16px calc(24px + var(--safe-bot))}
.sh{display:flex;align-items:center;gap:8px;margin:0 0 14px}
.sl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--green);white-space:nowrap}
.sline{flex:1;height:1px;background:var(--border)}
.mb{margin-bottom:32px}

/* ── MATCH GRID ── */
.mgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:12px;margin-bottom:32px}

/* ── MATCH CARD ── */
.mc{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color .2s,transform .2s}
.mc:active{transform:scale(.99)}
.mc.exact{border-left:3px solid var(--green);border-color:var(--green)}
.mc.correct{border-left:3px solid var(--amber);border-color:var(--amber)}
.mc.wrong{border-left:3px solid var(--red);border-color:var(--red)}
.mc.is-live{border-left:3px solid var(--red);border-color:rgba(239,68,68,.4);animation:livepulse 2s ease-in-out infinite}
@keyframes livepulse{0%,100%{border-color:rgba(239,68,68,.3)}50%{border-color:rgba(239,68,68,.7)}}

.mc-top{display:flex;align-items:center;justify-content:space-between;padding:8px 13px;background:rgba(0,0,0,.22);border-bottom:1px solid var(--border);flex-wrap:wrap;gap:4px}
.grp{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;background:var(--gdim);color:var(--green);border:1px solid rgba(16,185,129,.25);padding:2px 7px;border-radius:4px}
.mt{font-size:10px;color:var(--t2)}
.mv{font-size:10px;color:var(--t3)}

/* ── LIVE BADGE ── */
.live-badge{display:inline-flex;align-items:center;gap:4px;background:var(--red);color:#fff;font-size:8px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;padding:2px 7px;border-radius:20px}
.live-dot{width:5px;height:5px;background:#fff;border-radius:50%;animation:ldot 1s ease-in-out infinite}
@keyframes ldot{0%,100%{opacity:1}50%{opacity:.2}}

/* ── FLAG ── */
.tf{display:block;margin:0 auto}
img.tf{width:52px;height:35px;object-fit:cover;border-radius:4px;box-shadow:0 1px 6px rgba(0,0,0,.5)}
span.tf{font-size:28px;line-height:1.2}
.team{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center}
.tn{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.ta{font-size:9px;color:var(--t3);letter-spacing:1px}

.mc-body{padding:16px 12px 6px;display:flex;align-items:center;gap:8px}
.sw{display:flex;align-items:center;gap:5px;flex-direction:column}
.sc{font-size:42px;font-weight:900;color:#fff;line-height:1;font-variant-numeric:tabular-nums}
.ss{font-size:24px;color:var(--t3);font-weight:200}
.pred-row{display:flex;align-items:center;gap:5px}
.live-score-row{display:flex;align-items:center;gap:4px;margin-top:2px}
.live-sc{font-size:22px;font-weight:900;color:var(--red);font-variant-numeric:tabular-nums;line-height:1}
.live-sep{font-size:14px;color:var(--red);opacity:.6}
.live-lbl{font-size:8px;font-weight:800;color:var(--red);letter-spacing:1.5px;text-transform:uppercase;text-align:center}

.mc-det{padding:2px 12px 13px}
.scorers{display:flex;gap:6px;padding:7px 0 9px;border-bottom:1px solid var(--border);font-size:10.5px}
.sh2{flex:1;color:var(--t2)}.sa2{flex:1;color:var(--t2);text-align:right}
.sn{display:block;color:var(--t1);font-weight:500;line-height:1.5}
.mc-foot{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;padding:8px 0 0;flex-wrap:wrap}
.conf{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:3px 9px;border-radius:20px;white-space:nowrap}
.c-high{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3)}
.c-medium-high{background:rgba(16,185,129,.1);color:#6ee7b7;border:1px solid rgba(16,185,129,.2)}
.c-medium{background:var(--adim);color:var(--amber);border:1px solid rgba(245,158,11,.3)}
.c-low{background:var(--rdim);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.moment{font-size:10px;color:var(--t3);font-style:italic;flex:1;text-align:right;line-height:1.5;max-width:58%}

/* ── RESULT ZONE ── */
.rzone{margin-top:11px;padding-top:11px;border-top:1px solid var(--border)}
.rbtn{width:100%;background:none;border:1px solid var(--border2);color:var(--t2);font-size:11px;padding:8px;border-radius:8px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.rbtn:active{background:var(--gdim);border-color:var(--green);color:var(--green)}
.rform{display:none;margin-top:10px}
.rform.open{display:block}
.rinputs{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ig{display:flex;flex-direction:column;align-items:center;gap:3px}
.ig label{font-size:9px;color:var(--t3);letter-spacing:1px;text-transform:uppercase}
.rinputs input{width:54px;background:rgba(255,255,255,.06);border:1px solid var(--border2);color:#fff;font-size:20px;font-weight:700;text-align:center;padding:8px 4px;border-radius:8px;outline:none;-moz-appearance:textfield}
.rinputs input::-webkit-outer-spin-button,.rinputs input::-webkit-inner-spin-button{-webkit-appearance:none}
.rinputs input:focus{border-color:var(--green)}
.rinputs .sep{color:var(--t3);font-size:18px}
.bsave{flex:1;background:var(--green);color:#fff;border:none;padding:9px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}
.rdisplay{background:rgba(0,0,0,.22);border-radius:8px;padding:11px;margin-top:9px;display:none}
.rdisplay.on{display:block}
.rrow{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px}
.rrow .lbl{color:var(--t3)}.rrow .val{font-weight:700}
.otag{text-align:center;margin-top:7px;font-size:11px;font-weight:700;padding:5px;border-radius:6px}
.ot-exact{background:rgba(16,185,129,.18);color:var(--green)}
.ot-correct{background:rgba(245,158,11,.18);color:var(--amber)}
.ot-wrong{background:rgba(239,68,68,.18);color:var(--red)}
.editlnk{font-size:10px;color:var(--t3);cursor:pointer;text-align:right;display:block;margin-top:5px}
.auto-badge{font-size:9px;color:var(--green);opacity:.7;margin-left:4px}

/* ── LIVE RESULT ZONE ── */
.live-rzone{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:10px 12px;margin-top:9px}
.live-rzone .lr-row{display:flex;justify-content:space-between;font-size:11px;align-items:center}
.live-rzone .lr-lbl{color:var(--red);font-weight:700;font-size:9px;letter-spacing:.8px;text-transform:uppercase}
.live-rzone .lr-score{font-size:16px;font-weight:900;color:var(--red);font-variant-numeric:tabular-nums}

/* ── VERDICT ── */
.vbox{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:32px}
.vtog{width:100%;background:none;border:none;padding:13px 17px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;color:var(--t1);-webkit-tap-highlight-color:transparent}
.vtog:active{background:rgba(255,255,255,.02)}
.vlbl{display:flex;align-items:center;gap:8px;font-weight:700;font-size:13px}
.vchev{color:var(--t3);transition:transform .25s}
.vchev.open{transform:rotate(180deg)}
.vbody{display:none;padding:0 17px 17px;border-top:1px solid var(--border)}
.vbody.open{display:block}
.vtxt{padding-top:13px;font-size:13px;line-height:1.8;color:var(--t2);font-style:italic}
.vsig{text-align:right;font-size:11px;color:var(--t3);margin-top:9px}

/* ── PLAYERS ── */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;margin-bottom:32px}
.pc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px}
.pn{font-weight:700;font-size:13px;margin-bottom:2px;display:flex;align-items:center;gap:6px}
.pflag{display:inline-block}
img.pflag{width:22px;height:15px;object-fit:cover;border-radius:2px;vertical-align:middle;margin-right:2px}
span.pflag{font-size:16px;vertical-align:middle}
.pt{font-size:9px;color:var(--green);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:7px}
.ps{font-size:11px;color:var(--t2);line-height:1.5}
.pw{margin-top:8px;font-size:10px;color:var(--t3);padding-top:8px;border-top:1px solid var(--border);line-height:1.5}

/* ── ACCURACY ── */
.abox{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:32px}
.agrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:16px}
@media(min-width:480px){.agrid{grid-template-columns:repeat(4,1fr)}}
.acard{background:rgba(0,0,0,.2);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.av{font-size:28px;font-weight:900;line-height:1;margin-bottom:4px}
.av.g{color:var(--green)}.av.a{color:var(--amber)}.av.gold{color:var(--gold)}.av.r{color:var(--red)}
.al{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--t3)}
.bw{margin-top:5px;background:rgba(255,255,255,.07);height:3px;border-radius:2px;overflow:hidden}
.bar{height:100%;border-radius:2px;transition:width .5s ease}
.bar.g{background:var(--green)}.bar.a{background:var(--amber)}.bar.gold{background:var(--gold)}.bar.r{background:var(--red)}

/* ── HISTORY ── */
.hbox{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:32px;overflow-x:auto}
table.ht{width:100%;border-collapse:collapse;font-size:12px;min-width:520px}
table.ht th{text-align:left;padding:6px 10px;font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:var(--t3);border-bottom:1px solid var(--border);font-weight:600}
table.ht td{padding:9px 10px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--t2)}
table.ht tr:last-child td{border-bottom:none}
.be{color:var(--green);font-weight:700}.bc{color:var(--amber);font-weight:700}.bw2{color:var(--red);font-weight:700}.bp{color:var(--t3);font-style:italic}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(20px + var(--safe-bot));left:50%;transform:translateX(-50%) translateY(20px);background:#1f2937;color:var(--t1);font-size:12px;padding:10px 18px;border-radius:20px;opacity:0;transition:all .3s;pointer-events:none;z-index:999;border:1px solid var(--border2)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── LOADING ── */
.loading{text-align:center;padding:60px 20px;color:var(--t3);font-size:14px}
.spin{display:inline-block;font-size:28px;animation:spin 1s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── REFRESH BAR ── */
.rfbar{text-align:center;font-size:10px;color:var(--t3);padding:4px 0 12px;opacity:.7}

@media(max-width:420px){.sc{font-size:36px}img.tf{width:44px;height:30px}.wrap{padding:16px 12px calc(16px + var(--safe-bot))}}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-in">
    <div class="logo">
      <span style="font-size:24px">⚽</span>
      <div>
        <h1>WC 2026 <em>Analyst</em></h1>
        <small>Elite Prediction Engine</small>
      </div>
    </div>
    <div class="hdr-right">
      <span id="hdr-date"></span>
      <span id="hdr-live"></span>
    </div>
  </div>
</header>

<main class="wrap" id="app">
  <div class="loading"><div class="spin">⚽</div><br>Loading today's predictions…</div>
</main>

<div class="toast" id="toast"></div>

<script>
// ── CDN for flags ──
const FLAG_CDN = 'https://flagcdn.com/w80/';

function flagImg(team, size) {
  const w = size === 'sm' ? 'w40' : 'w80';
  const h = size === 'sm' ? 15 : 35;
  const ew = size === 'sm' ? 22 : 52;
  if (team.cc) {
    return `<img class="tf" src="https://flagcdn.com/${w}/${team.cc}.png" alt="${team.name}" width="${ew}" height="${h}" onerror="this.outerHTML='<span class=\\'tf\\'>${team.flag||'🏴'}</span>'">`;
  }
  return `<span class="tf">${team.flag||'🏴'}</span>`;
}

function playerFlagEl(p) {
  if (p.cc) {
    return `<img class="pflag" src="https://flagcdn.com/w40/${p.cc}.png" alt="${p.team}" onerror="this.outerHTML='<span class=\\'pflag\\'>${p.flag||''}</span>'">`;
  }
  return `<span class="pflag">${p.flag||''}</span>`;
}

// ── Storage ──
const SK='wc2026_r', HK='wc2026_h';
const getR=()=>{try{return JSON.parse(localStorage.getItem(SK)||'{}')}catch{return{}}};
const getH=()=>{try{return JSON.parse(localStorage.getItem(HK)||'[]')}catch{return[]}};
const saveR=(id,v)=>{const r=getR();r[id]=v;localStorage.setItem(SK,JSON.stringify(r))};
const delR=id=>{const r=getR();delete r[id];localStorage.setItem(SK,JSON.stringify(r))};

// ── Outcome ──
function outcome(pred,actual){
  if(!actual)return'pending';
  const po=pred.h>pred.a?'H':pred.h<pred.a?'A':'D';
  const ao=actual.h>actual.a?'H':actual.h<actual.a?'A':'D';
  if(pred.h===actual.h&&pred.a===actual.a)return'exact';
  if(po===ao)return'correct';
  return'wrong';
}

// ── Toast ──
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}

// ── Render Matches ──
function renderMatches(B){
  const results=getR();
  return B.matches.map(m=>{
    // Auto result from data.json beats manual localStorage entry
    const autoAct = m.result || null;
    const manualAct = results[m.id] || null;
    const act = autoAct || manualAct;
    const isAuto = !!autoAct;
    const isLive = m.status === 'live';
    const liveScore = m.live_score || null;

    // If auto result, persist to localStorage too (for history tracking)
    if (autoAct && !manualAct) saveR(m.id, { h: autoAct.h, a: autoAct.a });

    const out = outcome(m.pred, act);
    let cardCls = 'mc';
    if (isLive) cardCls += ' is-live';
    else if (out === 'exact') cardCls += ' exact';
    else if (out === 'correct') cardCls += ' correct';
    else if (out === 'wrong') cardCls += ' wrong';

    const confCls='conf c-'+m.confidence.toLowerCase().replace(/[\s\-]+/g,'-');
    const hS=m.scorers.h.map(s=>`<span class="sn">${s}</span>`).join('')||`<span style="color:var(--t3)">—</span>`;
    const aS=m.scorers.a.map(s=>`<span class="sn">${s}</span>`).join('')||`<span style="color:var(--t3)">—</span>`;

    const liveBadge = isLive ? `<span class="live-badge"><span class="live-dot"></span>LIVE</span>` : '';

    const liveZone = isLive && liveScore ? `
      <div class="live-rzone">
        <div class="lr-row">
          <span class="lr-lbl">🔴 Live Score</span>
          <span class="lr-score">${m.home.abbr} ${liveScore.h} – ${liveScore.a} ${m.away.abbr}</span>
        </div>
      </div>` : '';

    const resD = act ? `
      <div class="rdisplay on">
        <div class="rrow"><span class="lbl">Predicted</span><span class="val">${m.home.abbr} ${m.pred.h}–${m.pred.a} ${m.away.abbr}</span></div>
        <div class="rrow"><span class="lbl">Actual${isAuto?'<span class="auto-badge">🤖 auto</span>':''}</span><span class="val">${m.home.abbr} ${act.h}–${act.a} ${m.away.abbr}</span></div>
        <div class="otag ${out==='exact'?'ot-exact':out==='correct'?'ot-correct':'ot-wrong'}">
          ${out==='exact'?'✓ EXACT SCORE HIT':out==='correct'?'✓ CORRECT OUTCOME':'✗ WRONG OUTCOME'}
        </div>
        ${!isAuto?`<span class="editlnk" onclick="editR('${m.id}')">Edit result</span>`:''}
      </div>` : '';

    const entryZone = !act && !isLive ? `
      <button class="rbtn" onclick="openForm('${m.id}',this)">+ Enter Actual Result</button>
      <div class="rform" id="rf-${m.id}">
        <div class="rinputs">
          <div class="ig"><label>${m.home.abbr}</label><input type="number" id="hi-${m.id}" min="0" max="20" placeholder="0" inputmode="numeric"></div>
          <span class="sep">–</span>
          <div class="ig"><label>${m.away.abbr}</label><input type="number" id="ai-${m.id}" min="0" max="20" placeholder="0" inputmode="numeric"></div>
          <button class="bsave" onclick="submitR('${m.id}')">Save</button>
        </div>
      </div>` :
      act ? `<button class="rbtn" onclick="editR('${m.id}')">✎ Edit Result</button>` : '';

    return`<div class="${cardCls}" id="mc-${m.id}">
      <div class="mc-top">
        <span class="grp">${m.group}</span>
        ${liveBadge}
        <span class="mt">${m.time}</span>
        <span class="mv">${m.venue}</span>
      </div>
      <div class="mc-body">
        <div class="team">${flagImg(m.home)}<span class="tn">${m.home.name}</span><span class="ta">${m.home.abbr}</span></div>
        <div class="sw">
          <div class="pred-row"><span class="sc">${m.pred.h}</span><span class="ss">–</span><span class="sc">${m.pred.a}</span></div>
          ${isLive && liveScore ? `<div class="live-score-row"><span class="live-sc">${liveScore.h}</span><span class="live-sep">–</span><span class="live-sc">${liveScore.a}</span></div><div class="live-lbl">live</div>` : ''}
        </div>
        <div class="team">${flagImg(m.away)}<span class="tn">${m.away.name}</span><span class="ta">${m.away.abbr}</span></div>
      </div>
      <div class="mc-det">
        <div class="scorers"><div class="sh2">${hS}</div><div class="sa2">${aS}</div></div>
        <div class="mc-foot">
          <span class="${confCls}">${m.confidence} confidence</span>
          <span class="moment">${m.moment}</span>
        </div>
        <div class="rzone">
          ${entryZone}
          ${resD}
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── Render Accuracy ──
function renderAccuracy(B){
  const results=getR(),hist=getH();
  const allP={};
  hist.forEach(e=>{allP[e.id]=e});
  B.matches.forEach(m=>{if(!allP[m.id])allP[m.id]={id:m.id,pred:m.pred,confidence:m.confidence,matchLabel:`${m.home.name} vs ${m.away.name}`,date:B.dateKey}});
  let total=0,correct=0,exact=0,wrong=0;
  for(const[id,p]of Object.entries(allP)){
    const act=results[id];if(!act)continue;total++;
    const out=outcome(p.pred,act);
    if(out==='exact'){exact++;correct++;}else if(out==='correct')correct++;else if(out==='wrong')wrong++;
  }
  const pct=n=>total>0?Math.round(n/total*100)+'%':'—';
  const bw=n=>total>0?Math.round(n/total*100)+'%':'0%';
  return`<div class="agrid">
    <div class="acard"><div class="av g">${total||'—'}</div><div class="al">Tracked</div><div class="bw"><div class="bar g" style="width:${total>0?'100%':'0%'}"></div></div></div>
    <div class="acard"><div class="av a">${pct(correct)}</div><div class="al">Correct Outcome</div><div class="bw"><div class="bar a" style="width:${bw(correct)}"></div></div></div>
    <div class="acard"><div class="av gold">${pct(exact)}</div><div class="al">Exact Score</div><div class="bw"><div class="bar gold" style="width:${bw(exact)}"></div></div></div>
    <div class="acard"><div class="av r">${pct(wrong)}</div><div class="al">Wrong</div><div class="bw"><div class="bar r" style="width:${bw(wrong)}"></div></div></div>
  </div>`;
}

// ── Render History ──
function renderHistory(B){
  const results=getR(),hist=getH();
  const allP={};
  hist.forEach(e=>{allP[e.id]={...e}});
  B.matches.forEach(m=>{if(!allP[m.id])allP[m.id]={id:m.id,date:B.dateKey,matchLabel:`${m.home.name} vs ${m.away.name}`,pred:m.pred,confidence:m.confidence}});
  const entries=Object.values(allP).map(e=>({...e,actual:results[e.id]||null}));
  entries.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const hasAny=entries.some(e=>e.actual);
  if(!hasAny)return`<p style="text-align:center;padding:20px 0;font-size:12px;color:var(--t3)">No results yet — they'll appear here automatically once matches finish.</p>`;
  const rows=entries.map(e=>{
    const out=outcome(e.pred,e.actual);
    const ob={exact:'<span class="be">✓ Exact</span>',correct:'<span class="bc">✓ Outcome</span>',wrong:'<span class="bw2">✗ Wrong</span>',pending:'<span class="bp">Pending</span>'};
    return`<tr><td>${e.date||'—'}</td><td>${e.matchLabel||e.id}</td><td>${e.pred.h}–${e.pred.a}</td><td>${e.actual?`${e.actual.h}–${e.actual.a}`:'—'}</td><td>${e.confidence||'—'}</td><td>${ob[out]}</td></tr>`;
  }).join('');
  return`<table class="ht"><thead><tr><th>Date</th><th>Match</th><th>Predicted</th><th>Actual</th><th>Confidence</th><th>Result</th></tr></thead><tbody>${rows}</tbody></table>`;
}

// ── Render Players ──
function renderPlayers(B){
  return B.players.map(p=>`
    <div class="pc">
      <div class="pn">${playerFlagEl(p)} ${p.name}</div>
      <div class="pt">${p.team}</div>
      <div class="ps">${p.stat}</div>
      <div class="pw">👁 ${p.watch}</div>
    </div>`).join('');
}

// ── Save to history ──
function saveToHistory(B){
  const hist=getH();
  B.matches.forEach(m=>{
    if(!hist.find(e=>e.id===m.id))hist.push({id:m.id,date:B.dateKey,matchLabel:`${m.home.name} vs ${m.away.name}`,pred:m.pred,confidence:m.confidence});
  });
  localStorage.setItem(HK,JSON.stringify(hist));
}

// ── Interactive handlers ──
window.openForm=(id,btn)=>{
  const f=document.getElementById('rf-'+id);
  const open=f.classList.toggle('open');
  btn.textContent=open?'✕ Cancel':'+ Enter Actual Result';
};
window.editR=id=>{delR(id);renderAll(window._B)};
window.submitR=id=>{
  const h=parseInt(document.getElementById('hi-'+id).value);
  const a=parseInt(document.getElementById('ai-'+id).value);
  if(isNaN(h)||isNaN(a)||h<0||a<0){toast('Enter valid scores');return}
  saveR(id,{h,a});toast('Result saved ✓');renderAll(window._B);
};
window.toggleV=btn=>{
  const b=document.getElementById('vb');
  const c=btn.querySelector('.vchev');
  b.classList.toggle('open');c.classList.toggle('open');
};

// ── Full render ──
function renderAll(B){
  window._B=B;
  const today=new Date().toISOString().split('T')[0];
  document.getElementById('hdr-date').textContent=B.date;
  const hasLive = B.matches && B.matches.some(m=>m.status==='live');
  document.getElementById('hdr-live').innerHTML=
    hasLive ? '<span class="pill" style="background:rgba(239,68,68,.15);color:var(--red);border-color:rgba(239,68,68,.3)">🔴 Live</span>' :
    today===B.dateKey ? '<span class="pill">Match Day</span>' : '';
  saveToHistory(B);
  document.getElementById('app').innerHTML=`
    <div class="sh mb"><span class="sl">⚡ Today's Predictions</span><div class="sline"></div></div>
    <div class="mgrid">${renderMatches(B)}</div>

    <div class="sh"><span class="sl">📋 Analyst's Verdict</span><div class="sline"></div></div>
    <div class="vbox mb">
      <button class="vtog" onclick="toggleV(this)">
        <span class="vlbl">🎙 Read Today's Analysis</span>
        <span class="vchev">▼</span>
      </button>
      <div class="vbody" id="vb">
        <p class="vtxt">${B.verdict}</p>
        <p class="vsig">— The Analyst</p>
      </div>
    </div>

    <div class="sh"><span class="sl">⭐ Players to Watch</span><div class="sline"></div></div>
    <div class="pgrid mb">${renderPlayers(B)}</div>

    <div class="sh"><span class="sl">📊 Prediction Accuracy</span><div class="sline"></div></div>
    <div class="abox mb">${renderAccuracy(B)}</div>

    <div class="sh"><span class="sl">📜 Prediction History</span><div class="sline"></div></div>
    <div class="hbox">${renderHistory(B)}</div>
    <div class="rfbar" id="rfbar">Auto-refreshes every 5 min · <span id="rfts"></span></div>
  `;
  document.getElementById('rfts').textContent = 'Last update: ' + new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

// ── Boot + Auto-refresh ──
let _lastHash = '';

function loadData(silent){
  return fetch('./data.json?v='+Date.now())
    .then(r=>{if(!r.ok)throw new Error('no data');return r.json()})
    .then(B=>{
      const hash=JSON.stringify(B);
      if(hash!==_lastHash){_lastHash=hash;renderAll(B);}
      else if(!silent){
        const el=document.getElementById('rfts');
        if(el)el.textContent='Last update: '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
      }
    });
}

loadData(false).catch(()=>{
  document.getElementById('app').innerHTML=`
    <div class="loading">
      <div style="font-size:32px">📭</div>
      <br>No predictions available yet.<br>
      <span style="font-size:12px">Check back when today's briefing runs.</span>
    </div>`;
});

// Auto-refresh every 5 minutes
setInterval(()=>loadData(true).catch(()=>{}), 5*60*1000);

// Service Worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
</body>
</html>
